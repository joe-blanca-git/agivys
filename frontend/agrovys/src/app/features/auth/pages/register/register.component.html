<div class="container-fluid px-4 px-md-5">
  <div class="card shadow-sm border-0 rounded-4">
    <div class="card-header d-flex flex-column justify-content-center align-items-center">
      <div class="d-flex align-items-center">
        <img class="img-logo-header cursor-pointer" [routerLink]="['/auth/login']" src="/images/logo/logo-agrovys-brand.png" />
        <span class="title h1 m-0 text-agrovys">CRIE SUA CONTA AGRO<span class="text-agrovys-secondary">VYS</span></span>
      </div>
      <span class="text-secondary">
        Preencha as informações ou crie sua conta pelo WhatsApp de forma rápida e prática respondendo algumas perguntas. 
        <a href="" class="fw-bold text-success">
          <i class="fa-brands fa-whatsapp text-success fa-xl"></i> Cadastrar pelo WhatsApp
        </a>
      </span>
    </div>

    <div class="card-body p-4 p-md-5">
      <div class="d-flex justify-content-between align-items-center mb-5 position-relative">
        <div class="progress position-absolute w-100" style="height: 4px; z-index: 0; top: 20px">
          <div class="progress-bar bg-primary" [style.width.%]="(currentStep / (steps.length - 1)) * 100" style="transition: width 0.4s ease"></div>
        </div>
        
        <div *ngFor="let step of steps" class="d-flex flex-column align-items-center" style="z-index: 1; cursor: pointer" (click)="setStep(step.index)">
          <div class="rounded-circle d-flex align-items-center justify-content-center mb-2 shadow-sm" 
               [ngClass]="currentStep >= step.index ? 'bg-primary text-white' : 'bg-light text-secondary border'" 
               style="width: 45px; height: 45px; transition: all 0.3s ease">
            <i class="fa {{ step.icon }}"></i>
          </div>
          <span class="small fw-semibold d-none d-sm-block" [ngClass]="currentStep >= step.index ? 'text-primary' : 'text-secondary'">
            {{ step.name }}
          </span>
        </div>
      </div>

      <div class="steper-body py-1 min-vh-50 position-relative">
        <div *ngIf="isLoading" class="position-absolute w-100 h-100 d-flex justify-content-center align-items-center bg-white bg-opacity-75" style="z-index: 10;">
          <div class="spinner-border text-primary" role="status"></div>
        </div>

        <div *ngIf="currentStep === 0">
          <app-register-form></app-register-form>
        </div>

        <div *ngIf="currentStep === 1">
          <app-register-company-form></app-register-company-form>
        </div>
      </div>

      <div class="d-flex justify-content-between mt-4 pt-4 border-top">
        <button class="btn btn-outline-secondary px-4 rounded-pill" (click)="prevStep()" [disabled]="currentStep === 0 || isLoading">
          <i class="fa fa-arrow-left me-2"></i> Voltar
        </button>

        <button class="btn btn-primary px-4 rounded-pill" (click)="nextStep()" *ngIf="currentStep < steps.length - 1" [disabled]="isLoading">
          <span *ngIf="!isLoading">Próximo <i class="fa fa-arrow-right ms-2"></i></span>
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm"></span>
        </button>

        <button class="btn btn-success px-4 rounded-pill" *ngIf="currentStep === steps.length - 1" (click)="finishStep()" [disabled]="isLoading">
          <span *ngIf="!isLoading">Finalizar Cadastro <i class="fa fa-check ms-2"></i></span>
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm"></span>
        </button>
      </div>
    </div>
  </div>

  <div class="bg-agrovys rounded-bottom-4 py-3" style="margin-top: -1rem;">
    <div class="d-flex justify-content-between px-4 mt-2 small text-white-50">
      <div><img src="" alt=""></div>
      <div class="links">
        <a href="#" class="text-white-50 me-3">Contato</a>
        <a href="#" class="text-white-50 me-3">Termos de Uso</a>
        <a href="#" class="text-white-50 me-3">Políticas de Privacidade</a>
        <a href="#" class="text-white-50">Pagamento Seguro</a>
      </div>
      <span>Copyright © 2026 Agrovys MEI. Todos os direitos reservados.</span>
    </div>
  </div>
</div>
