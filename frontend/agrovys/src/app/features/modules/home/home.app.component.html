
<div class="container-fluid py-4 px-3 px-md-4">

  <!-- Header da Página -->
  <div class="row mb-4">
    <div class="col-12">
      <div class="d-flex align-items-center justify-content-between">
        <div>
          <h4 class="fw-bold text-dark mb-1">Painel de Controle</h4>
          <p class="text-muted mb-0 text-small">Visão geral das suas operações agrícolas</p>
        </div>
        <div class="d-none d-md-block">
          <span class="text-muted text-small">{{ formattedDate }}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- KPIs -->
  <div class="row g-3 mb-4">

    <div class="col-12 col-sm-6 col-md-4">
      <div class="card card-agrovys border-0 h-100">
        <div class="card-body d-flex align-items-center gap-3 p-3 p-md-4">
          <div class="kpi-icon bg-agrovys d-flex align-items-center justify-content-center rounded-3"
            style="width: 52px; height: 52px; flex-shrink: 0;">
            <i class="fa fa-map-location-dot fa-lg text-white"></i>
          </div>
          <div class="d-flex flex-column">
            <span class="text-muted text-small fw-medium">Fazendas</span>
            <span class="h4 fw-bold text-dark mb-0">{{ farmsDashBoard.farms | number }}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-md-4">
      <div class="card card-agrovys border-0 h-100">
        <div class="card-body d-flex align-items-center gap-3 p-3 p-md-4">
          <div class="kpi-icon d-flex align-items-center justify-content-center rounded-3"
            style="width: 52px; height: 52px; flex-shrink: 0; background-color: #e8f5e9;">
            <i class="fa fa-regular fa-map fa-lg text-agrovys"></i>
          </div>
          <div class="d-flex flex-column">
            <span class="text-muted text-small fw-medium">Talhões</span>
            <span class="h4 fw-bold text-dark mb-0">{{ farmsDashBoard.fields | number }}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-md-4">
      <div class="card card-agrovys border-0 h-100">
        <div class="card-body d-flex align-items-center gap-3 p-3 p-md-4">
          <div class="kpi-icon d-flex align-items-center justify-content-center rounded-3"
            style="width: 52px; height: 52px; flex-shrink: 0; background-color: #f1f8e9;">
            <i class="fa fa-chart-area fa-lg" style="color: #689f38;"></i>
          </div>
          <div class="d-flex flex-column">
            <span class="text-muted text-small fw-medium">Área Total</span>
            <span class="h4 fw-bold text-dark mb-0">{{ farmsDashBoard.area | number }} <small class="text-muted fw-normal text-small">ha</small></span>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Seção de Acesso Rápido -->
  <div class="row g-3">
    <div class="col-12">
      <h6 class="fw-bold text-secondary text-uppercase mb-3" style="letter-spacing: 0.5px; font-size: 0.75rem;">Acesso Rápido</h6>
    </div>

    <div class="col-6 col-sm-4 col-md-3 col-lg-2">
      <div class="card card-agrovys border-0 text-center p-3 cursor-pointer" routerLink="/farms">
        <div class="d-flex flex-column align-items-center gap-2">
          <div class="bg-agrovys d-flex align-items-center justify-content-center rounded-3 mb-1"
            style="width: 44px; height: 44px;">
            <i class="fa-brands fa-houzz text-white"></i>
          </div>
          <span class="text-small fw-semibold text-dark">Fazendas</span>
        </div>
      </div>
    </div>

  </div>

</div>
