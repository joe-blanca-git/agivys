<div class="container-fluid h-100 text-start" [ngClass]="{'bg-loading': isLoadingData}">

    <div class="row" *ngIf="!isLoadingData">
        <div class="col-12 d-flex align-items-center justify-content-between py-2">

            <div class="title text-secondary fw-bold d-flex align-items-center h5 w-100 overflow-hidden">
                <span class="text-slice" title="Limites, Talhões e Linhas de Orientação">Limites, Talhões e Linhas de
                    Orientação</span>
            </div>

            <div class="actions text-secondary d-none d-md-flex align-items-center justify-content-end gap-2">
                <div class="btn btn-agrovys-secondary d-flex align-items-center overflow-hidden" title="Exportar">
                    <div class="fa fa-download flex-shrink-0"></div>
                    <div class="d-none d-sm-block overflow-hidden w-100">
                        <span class="text-slice">&nbsp;Exportar</span>
                    </div>
                </div>
                <div class="btn btn-agrovys-secondary d-flex align-items-center overflow-hidden" title="Arquivar"
                    (click)="archiveSelectedFarms()">
                    <div class="fa fa-archive flex-shrink-0"></div>
                    <div class="d-none d-sm-block overflow-hidden w-100">
                        <span class="text-slice">&nbsp;Arquivar</span>
                    </div>
                </div>
                <div class="btn btn-agrovys-primary d-flex align-items-center overflow-hidden" title="Importar Fazenda"
                    (click)="handleNewFarm()">
                    <div class="fa fa-upload flex-shrink-0"></div>
                    <div class="d-none d-sm-block overflow-hidden w-100">
                        <span class="text-slice">&nbsp;Importar Fazenda</span>
                    </div>
                </div>
                <div class="btn btn-agrovys-primary d-flex align-items-center overflow-hidden" title="Criar Fazenda"
                    (click)="handleNewFarmSimple()">
                    <div class="fa fa-plus flex-shrink-0"></div>
                    <div class="d-none d-sm-block overflow-hidden w-100">
                        <span class="text-slice">&nbsp;Criar Fazenda</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="row h-100" *ngIf="!isLoadingData">

        <div class="col-12 col-sm-4 col-md-3 p-0">

            <div class="filter d-flex align-items-center justify-content-center px-2 py-1 gap-2 mb-2">
                <div class="input-group">
                    <span class="input-group-text" id="basic-addon1">
                        <i class="fa fa-magnifying-glass" aria-hidden="true"></i>
                    </span>
                    <input type="text" class="form-control" placeholder="Pesquisar" aria-label="pesquisar"
                        aria-describedby="basic-addon1" />
                </div>

                <div class="btn btn-sm btn-agrovys-outline-primary">
                    <div class="fa fa-filter"></div>
                </div>
            </div>

            <div class="list-farms mb-2" [ngClass]="{'bg-loading': isLoadingListFarms}">
                <div class="accordion" id="accordionFarms" *ngIf="!isLoadingListFarms">
                    <div class="accordion-item" *ngFor="let farm of farms; let i = index">
                        <h2 class="accordion-header d-flex align-items-center position-relative"
                            [id]="'panelsStayOpen-heading' + i">
                            <input class="form-check-input ms-3 me-2 my-0" type="checkbox" [(ngModel)]="farm.selected"
                                style="z-index: 10;" (click)="$event.stopPropagation()">
                            <button class="accordion-button collapsed ps-1" type="button" data-bs-toggle="collapse"
                                [attr.data-bs-target]="'#panelsStayOpen-collapse' + i" aria-expanded="false"
                                [attr.aria-controls]="'panelsStayOpen-collapse' + i">
                                <div class="d-flex w-100 flex-column me-3">
                                    <span class="fw-bold">{{ farm.name }}</span>
                                    <span>{{ farm.area ? (farm.area + ' ha') : '' }}</span>
                                </div>
                            </button>
                        </h2>
                        <div [id]="'panelsStayOpen-collapse' + i" class="accordion-collapse collapse"
                            [attr.aria-labelledby]="'panelsStayOpen-heading' + i">
                            <div class="accordion-body">
                                <nav>
                                    <div class="nav nav-tabs" id="nav-tab" role="tablist">
                                        <button class="nav-link active" id="nav-fields-tab" data-bs-toggle="tab"
                                            data-bs-target="#nav-fields" type="button" role="tab"
                                            aria-controls="nav-fields" aria-selected="true">Talhões</button>
                                        <button class="nav-link" id="nav-guidance-tab" data-bs-toggle="tab"
                                            data-bs-target="#nav-guidance" type="button" role="tab"
                                            aria-controls="nav-guidance" aria-selected="false">Linhas</button>
                                        <button class="nav-link" id="nav-info-tab" data-bs-toggle="tab"
                                            data-bs-target="#nav-info" type="button" role="tab" aria-controls="nav-info"
                                            aria-selected="false">Informações</button>
                                    </div>
                                </nav>
                                <div class="tab-content border border-top-0" id="nav-tabContent">
                                    <div class="tab-pane fade show active p-2" id="nav-fields" role="tabpanel"
                                        aria-labelledby="nav-fields-tab">
                                        <ul class="list-group">
                                            <li class="list-group-item text-small d-flex justify-content-between">
                                                <span class="fw-bold text-secondary">1</span>
                                                <span>2 ha</span>
                                            </li>
                                            <li class="list-group-item text-small d-flex justify-content-between">
                                                <span class="fw-bold text-secondary">2</span>
                                                <span>2 ha</span>
                                            </li>
                                            <li class="list-group-item text-small d-flex justify-content-between">
                                                <span class="fw-bold text-secondary">3</span>
                                                <span>2 ha</span>
                                            </li>
                                            <li class="list-group-item text-small d-flex justify-content-between">
                                                <span class="fw-bold text-secondary">4</span>
                                                <span>2 ha</span>
                                            </li>
                                        </ul>
                                    </div>
                                    <div class="tab-pane fade p-2" id="nav-guidance" role="tabpanel"
                                        aria-labelledby="nav-guidance-tab">
                                        <ul class="list-group">
                                            <li class="list-group-item text-small d-flex justify-content-between">
                                                <span class="fw-bold text-secondary text-uppercase">tipo 1</span>
                                                <span>COLHEITA</span>
                                            </li>
                                            <li class="list-group-item text-small d-flex justify-content-between">
                                                <span class="fw-bold text-secondary text-uppercase">tipo 2</span>
                                                <span>TRANSBORDO</span>
                                            </li>
                                            <li class="list-group-item text-small d-flex justify-content-between">
                                                <span class="fw-bold text-secondary text-uppercase">tipo 3</span>
                                                <span>HERBICIDA</span>
                                            </li>
                                            <li class="list-group-item text-small d-flex justify-content-between">
                                                <span class="fw-bold text-secondary text-uppercase">tipo 4</span>
                                                <span>VINHAÇA</span>
                                            </li>
                                        </ul>
                                    </div>
                                    <div class="tab-pane fade p-2" id="nav-info" role="tabpanel"
                                        aria-labelledby="nav-info-tab">
                                        <div class="row">
                                            <div class="col-12 py-2 d-flex justify-content-between">
                                                <span class="fw-bold text-secondary">Criado em: </span>
                                                <!-- <span>{{ farm.createdAt | date:'dd/MM/yyyy HH:mm:ss' }}</span> -->
                                            </div>
                                            <div class="col-12 py-2 d-flex justify-content-between">
                                                <span class="fw-bold text-secondary">Criado por: </span>
                                                <!-- <span>{{ farm.createdBy }}</span> -->
                                            </div>
                                            <div class="col-12 py-2 d-flex justify-content-between">
                                                <span class="fw-bold text-secondary">Última atualização: </span>
                                                <!-- <span>{{ farm.updatedAt | date:'dd/MM/yyyy HH:mm:ss' }}</span> -->
                                            </div>
                                            <div class="col-12 py-2 d-flex justify-content-between">
                                                <span class="fw-bold text-secondary">Última atualização por: </span>
                                                <!-- <span>{{ farm.updatedBy }}</span> -->
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <div class="col-12 col-sm-8 col-md-9 bg-agrovys d-none d-sm-block px-0">
            <div class="h-100 w-100 p-0">
                <app-farm-map [limitesGeoJson]="limitesGeoJson"></app-farm-map>
            </div>
        </div>
    </div>
</div>

<app-modal *ngIf="isVisibleNewFarm" [isVisible]="isVisibleNewFarm" [isCentered]="true" [isHeader]="true"
    [isActionsDisabled]="isLoadingNewFarm" [size]="'xl'" [title]="'Cadastrar Nova Fazenda'"
    [description]="'Preencha todas as informações para cadastrar uma nova fazenda!'"
    [styleTextTitle]="'bg-secondary-subtle'" [iconTitle]="''" [customActions]="actionsModal"
    (actionClick)="handleModalAction($event)" (close)="isVisibleNewFarm = false">
    <ng-template>
        <app-farm-new #newFarm (loadingEmit)="handleLoadingNewFarm($event)"
            (successEmit)="handleSuccessNewFarm()"></app-farm-new>
    </ng-template>
</app-modal>

<app-modal *ngIf="isVisibleNewFarmSimple" [isVisible]="isVisibleNewFarmSimple" [isCentered]="true" [isHeader]="true"
    [isActionsDisabled]="isLoadingNewFarmSimple" [size]="'md'" [title]="'Cadastrar Fazenda (Simples)'"
    [description]="'Preencha nome, cliente e ano safra para cadastrar a fazenda.'"
    [styleTextTitle]="'bg-secondary-subtle'" [iconTitle]="''" [customActions]="actionsModalSimple"
    (actionClick)="handleModalActionSimple($event)" (close)="isVisibleNewFarmSimple = false">
    <ng-template>
        <app-farm-new-simple #newFarmSimple (loadingEmit)="handleLoadingNewFarmSimple($event)"
            (successEmit)="handleSuccessNewFarmSimple()"></app-farm-new-simple>
    </ng-template>
</app-modal>
